<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="/tracker-repo/style.css">

</head>

<body>

    <header>
        <center>
            <h1>Tracker</h1>
            <br><br>
            <hr>
        </center>
    </header>
    <main>
        <center>
            <form>
                <div>
                    <h2>Sign Up</h2>
                    <br>
                </div>
                <div>
                    <input type="text" placeholder="Create Username" name="new_username">
                    <br><br>
                    <input type="password" placeholder="Create Password" name="new_password">
                    <br><br>
                    <input type="email" placeholder="Email" name="email">
                    <br><br>
                    <input type="submit" name="submit">
                    <br><br>
                </div>
                <div>
                    <a href="/tracker-repo/Login.html">Old user? Log in</a>
                </div>
            </form>
        </center>
    </main>
</body>

</html>
